<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tweet Collector</title>
  <style>
    body {
      margin: 0;
      width: 280px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #0f172a;
      color: #ffffff;
      padding: 9px 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #status {
      min-height: 18px;
      font-size: 12px;
      color: #334155;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <label for="targetCount">取得するツイート数</label>
    <input id="targetCount" type="number" min="10" step="10" value="100">
    <label for="topicKeyword">抽出キーワード</label>
    <input id="topicKeyword" type="text" placeholder="例: AI, 投資, 旅行">
    <button id="startButton" type="button">取得を開始</button>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
